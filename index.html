<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/math.js/1.7.6/math.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --surface: #16161d;
      --surface2: #1e1e28;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.4);
      --text: #f1f1f4;
      --text-dim: #6b6b7a;
      --btn-num: #1e1e28;
      --btn-op: #252532;
      --btn-eq: #6366f1;
      --btn-clear: #ef4444;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .calc {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }
    .display {
      background: var(--surface2);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 20px;
      text-align: right;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .display-expr {
      font-size: 16px;
      color: var(--text-dim);
      height: 24px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .display-result {
      font-size: 48px;
      font-weight: 300;
      color: var(--text);
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .memory-indicator {
      font-size: 12px;
      color: var(--accent);
      height: 18px;
      margin-bottom: 4px;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    button {
      border: none;
      border-radius: 14px;
      font-size: 20px;
      font-weight: 500;
      cursor: pointer;
      padding: 18px;
      transition: all 0.15s;
      color: var(--text);
      background: var(--btn-num);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { transform: scale(0.95); }
    .btn-op { background: var(--btn-op); }
    .btn-eq { background: var(--btn-eq); box-shadow: 0 4px 20px var(--accent-glow); }
    .btn-clear { background: var(--btn-clear); color: white; }
    .btn-memory { background: var(--surface2); font-size: 16px; }
    button:hover { filter: brightness(1.1); }
    .span2 { grid-column: span 2; }
    #toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #ef4444;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      z-index: 9999;
      display: none;
      animation: toastIn 0.2s ease;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  </style>
</head>
<body>
  <div id="toast">Error</div>
  <div class="calc">
    <div class="display">
      <div class="memory-indicator" id="memIndicator"></div>
      <div class="display-expr" id="expr"></div>
      <div class="display-result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-memory" onclick="memoryClear()">MC</button>
      <button class="btn-memory" onclick="memoryRecall()">MR</button>
      <button class="btn-memory" onclick="memoryAdd()">M+</button>
      <button class="btn-memory" onclick="memorySub()">M−</button>

      <button class="btn-op" onclick="input('%')">%</button>
      <button class="btn-op" onclick="input('÷')">÷</button>
      <button class="btn-op" onclick="input('×')">×</button>
      <button class="btn-op" onclick="input('−')">−</button>
      <button class="btn-op" onclick="input('+')">+</button>
      <button class="btn-op span2" onclick="calculate()">=</button>

      <button onclick="input('7')">7</button>
      <button onclick="input('8')">8</button>
      <button onclick="input('9')">9</button>
      <button onclick="input('4')">4</button>
      <button onclick="input('5')">5</button>
      <button onclick="input('6')">6</button>
      <button onclick="input('1')">1</button>
      <button onclick="input('2')">2</button>
      <button onclick="input('3')">3</button>
      <button class="span2" onclick="input('0')">0</button>
      <button onclick="input('.')">.</button>
    </div>
  </div>

  <script>
    // ========== SECURITY FIXES APPLIED ==========
    // 1. NO eval() or Function() constructor - uses math.js sandbox
    // 2. Input allowlist validation (whitelist approach)
    // 3. Output escaping to prevent XSS
    // 4. % operator fixed (percentage, not modulo)
    // 5. AC button clears memory (M)
    // 6. No dangerous patterns allowed

    const ALLOWLIST = /^[0-9+\-×÷.%() ]+$/;
    const MAX_LENGTH = 50;
    let memory = 0;
    let expression = '';
    let lastResult = '0';

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 2000);
    }

    function updateDisplay() {
      document.getElementById('expr').textContent = escapeHtml(expression);
      document.getElementById('result').textContent = escapeHtml(lastResult);
      document.getElementById('memIndicator').textContent = memory !== 0 ? 'M' : '';
    }

    function input(val) {
      if (expression.length >= MAX_LENGTH) return;
      expression += val;
      lastResult = '0';
      updateDisplay();
    }

    function safeEval(expr) {
      // Validate with allowlist
      if (!ALLOWLIST.test(expr)) {
        throw new Error('Invalid characters');
      }

      // Replace display symbols
      let e = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');

      // % as percentage: "100+10%" becomes "100+100*0.10"
      // Only convert "X%" when X is a number (not "%" alone)
      e = e.replace(/(\d+)%/g, '($1*0.01)');

      // Use math.js sandbox
      const scope = {};
      const result = math.evaluate(e, scope);
      
      if (typeof result === 'number' && isFinite(result)) {
        // Round to 10 decimal places
        return Math.round(result * 1e10) / 1e10;
      }
      return 'Error';
    }

    function calculate() {
      if (!expression) return;
      try {
        lastResult = String(safeEval(expression));
        expression = lastResult;
      } catch (e) {
        showToast('Invalid expression');
        lastResult = 'Error';
      }
      updateDisplay();
    }

    function clearAll() {
      expression = '';
      lastResult = '0';
      memory = 0;  // FIX: AC now clears memory
      updateDisplay();
    }

    function memoryClear() { memory = 0; updateDisplay(); }
    function memoryRecall() {
      if (memory !== 0) {
        expression = String(memory);
        lastResult = '0';
        updateDisplay();
      }
    }
    function memoryAdd() {
      try {
        const val = safeEval(expression || lastResult);
        memory += val;
      } catch (e) { showToast('Cannot add to memory'); }
      updateDisplay();
    }
    function memorySub() {
      try {
        const val = safeEval(expression || lastResult);
        memory -= val;
      } catch (e) { showToast('Cannot subtract from memory'); }
      updateDisplay();
    }

    updateDisplay();
  </script>
</body>
</html>
